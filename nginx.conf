server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # YAML content files — public GET, auth-protected PUT
    location /content/ {
        root /usr/share/nginx/html;

        # GET — public, no auth
        limit_except PUT {
            allow all;
        }

        # PUT — requires Basic Auth + DAV
        dav_methods PUT;
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        client_body_temp_path /tmp/nginx;
        create_full_put_path on;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/x-yaml;
    gzip_min_length 256;
}
