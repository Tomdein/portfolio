name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build, Push & Update Helm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and image name
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.version.outputs.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.IMAGE }}:latest

      - name: Checkout portfolio-helm
        uses: actions/checkout@v4
        with:
          repository: Tomdein/portfolio-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: portfolio-helm

      - name: Patch image tag in values.yaml
        run: |
          sed -i 's/^\(\s*tag:\s*\).*$/\1${{ steps.version.outputs.VERSION }}/' portfolio-helm/chart/values.yaml

      - name: Commit and push to portfolio-helm
        run: |
          cd portfolio-helm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/portfolio/values.yaml
          git commit -m "chore: update image tag to ${{ steps.version.outputs.VERSION }}"
          git push
