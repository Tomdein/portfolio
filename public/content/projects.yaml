projects:
  - title: "FETI solver"
    description: "An implementation of the Finite Element Tearing and Interconnecting (FETI) method for solving large-scale linear systems arising from finite element discretizations focused on effects of different floating point precisions. The solver was developed and tested on Karolina supercomputer - at that time a second fastest supercomputer in the Czech Republic sitting in the TOP500 list."
    tags: ["FETI", "HPC", "Karolina supercomputer", "Linux", "MATLAB"]
    image: "/images/projects/feti-solver.png"
    order: 1
  - title: "Raytracer & Pathtracer"
    description: "An implementation of a raytracer and pathtracer for rendering realistic images using various lighting models and optimizations."
    tags: ["Raytracer", "Pathtracer", "Rendering", "Graphics", "C++"]
    image: "/images/projects/raytracer-pathtracer.png"
    order: 2
  - title: "CRC 2024 & 2025"
    description: "Czech Rocket Challenge is an annual competition for students to design, build and launch a model rocket. I designed, simulated, built and tested the fully CFRP (carbon fibre) rocket as well programmed the avionics and base station."
    tags: ["Czech Rocket Challenge", "Rocket", "CFRP", "ANSYS", "Fusion 360", "Avionics"]
    image: "/images/projects/crc-2024-2025.png"
    order: 5
  - title: "Porsche student competition"
    description: "I competed in the Porsche student competition, where I competed in programming a maze-solving algorithm for an autonomous model vehicle using different sensors and also a camera-based machine vision system to detect and classify objects on the track."
    tags: ["Python", "Robotics", "Machine vision", "OpenCV"]
    image: "/images/projects/porsche-student-competition.png"
    order: 6
  - title: "S4A - Student for automotive"
    description: "I competed in the S4A - Student for automotive competition, where I competed in programming a maze-solving algorithm for an autonomous model vehicle using different sensors."
    tags: ["C++", "Robotics"]
    image: "/images/projects/s4a-student-for-automotive.webp"
    order: 7
  - title: "Game modding"
    description: "From simpler mods for World of Tanks to more complex ones like dll injection into Metin2 and then intercepting the WinAPI calls into DInput8 just to fake the input while the game is not focused to enable botting and getting full access to the embedded cpython interpreter for more complex moddding."
    tags: ["Game modding", "Reverse engineering", "Python", "C++", "YOLO object detection"]
    image: "/images/projects/game-modding.jpg"
    order: 8
  - title: "Homelab"
    description: "First a it was just a docker-compose running on Raspberry Pi, but it quickly evolved into a mini PC running Kubernetes cluster & Helm on Headless Alpine Linux installed via Ansible."
    tags: ["Homelab", "Kubernetes", "Raspberry Pi", "Docker", "Linux"]
    image: "/images/projects/homelab.webp"
    order: 10
  - title: "Home automation"
    description: "A home automation using Home Assistant with custom integrations - one scraping IDOS system and a upgrade of Tuya 3.3 protocol to version 3.4 along with wireshark dissector for it in Lua."
    tags: ["Home automation", "MQTT", "Python", "Lua", "Reverse engineering"]
    image: "/images/projects/home-automation.webp"
    order: 20
  - title: "AnetA8 3D printer"
    description: "More like ANotA8: Originaly a cheap 3D printer kit. After heavy modifications the only original parts are the stepper motors and linear guides on 2 axes. I modified AnetA8 with custom firmware, hardware upgrades and a custom enclosure to make it more reliable and enjoyable to use."
    tags: ["3D Printing", "Anet A8", "Klipper"]
    image: "/images/projects/anet-a8.jpg"
    order: 30
  - title: "Raspberry Pi HAT"
    description: "A custom Raspberry Pi HAT that controls 3D printer. The board is running a STM32 MCU that communicates with Linux via I2C and is programmed remotely via the RPi and OpenOCD. This is rev 1.0 that even got some IO upgrades - if it is not broken, just upgrade it."
    tags: ["Raspberry Pi", "STM32", "PCB Design", "Linux", "KiCAD"]
    image: "/images/projects/raspberry-pi-hat.jpg"
    order: 31
  - title: "LED ring"
    description: "A custom LED ring controlled by an ESP32. Created the PCB design and KiCAD scripts to generate the board layout. As you can see, I am missing an enclosure for it as I wanted to fit in into impossible space, but otherwise it's fully functional."
    tags: ["ESP32", "PCB Design", "KiCAD scripting"]
    image: "/images/projects/led-ring.jpg"
    order: 32
  - title: "WoT clan calendar/event system"
    description: "A calendar, event system and discord bot for World of Tanks clan created using microservices."
    tags: ["TypeScript", "PostgreSQL", "Redis", "Discord bot", "React", "FastAPI", "WebSockets", "Tailwind CSS"]
    image: "/images/projects/wot-clan-calendar.png"
    order: 50
  - title: "Portfolio"
    description: "This portfolio website built with React, TypeScript, and GSAP animations."
    tags: ["React", "TypeScript", "GSAP", "SCSS"]
    image: "/images/projects/portfolio.png"
    order: 51
